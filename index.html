<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>19 Years of Brilliance (Mostly)</title>

    <style>
        :root {
            --midnight: #0a0e1a;
            --gold: #d4af37;
            --champagne: #f7e7ce;
            --white: rgba(255, 255, 255, 0.9);
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --roast: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--midnight);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), #1a233a 0%, #0a0e1a 100%);
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: clamp(2rem, 8vw, 5rem);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 900px;
            width: 100%;
            margin-bottom: 50px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 10vw, 5rem);
            color: var(--champagne);
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--gold);
            margin-bottom: 2rem;
        }

        #timer-display {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 6vw, 3.5rem);
            color: var(--white);
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin: 2rem 0;
        }

        .timer-segment {
            display: flex;
            flex-direction: column;
            min-width: 80px;
        }
