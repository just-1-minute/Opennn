<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Love</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #ffe4e9;
            --deep-pink: #ffafbd;
            --text-color: #5e5e5e;
            --accent-color: #ff85a1;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            /* Soft pink gradient background */
            background: linear-gradient(135deg, var(--soft-pink) 0%, #ffc3a0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.4);
            padding: 3rem;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.6);
            max-width: 80%;
        }

        h1 {
            /* Lovely cursive font */
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: #d81b60;
            margin-bottom: 10px;
            animation: fadeInDown 1.5s ease-out;
        }

        p {
            font-size: 1.2rem;
            color: var(--text-color);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Pinterest-style Image Gallery */
        .gift-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .gift-card {
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .gift-card:hover {
            transform: translateY(-10px) rotate(2deg);
        }

        .gift-card img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
        }

        /* Balloon Animation */
        .balloon {
            position: absolute;
            bottom: -150px;
            width: 50px;
            height: 70px;
            border-radius: 50%;
            opacity: 0.8;
            animation: floatUp 8s linear infinite;
        }

        .balloon::before {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 22px;
            width: 2px;
            height: 40px;
            background: rgba(255,255,255,0.5);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 133, 161, 0.4);
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff4d7d;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Happy Birthday, Baby!</h1>
        <p>I hope you like your presents...</p>
        
        <div class="gift-grid">
            <div class="gift-card">
                <img src="https://i.pinimg.com/564x/0a/61/8b/0a618be495f59c72c918c5f0f35368a4.jpg" alt="Memories">
                <div style="margin-top:5px; font-size: 0.8rem;">Memories</div>
            </div>
            <div class="gift-card">
                <img src="https://i.pinimg.com/564x/53/7d/5a/537d5a5f1e8f2372a0f854b6652875f5.jpg" alt="Letters">
                <div style="margin-top:5px; font-size: 0.8rem;">Letters</div>
            </div>
            <div class="gift-card">
                <img src="https://i.pinimg.com/564x/0e/46/7c/0e467c69997e59c258d4a51f0449673d.jpg" alt="Flowers">
                <div style="margin-top:5px; font-size: 0.8rem;">Your Flowers</div>
            </div>
            <div class="gift-card">
                <img src="https://i.pinimg.com/564x/5d/74/4d/5d744d0339850c95847e62d475026938.jpg" alt="Cake">
                <div style="margin-top:5px; font-size: 0.8rem;">The Cake</div>
            </div>
        </div>

        <button class="btn" onclick="alert('I love you to the moon and back!')">Click for a Surprise</button>
    </div>

    <script>
        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            
            // Randomize position, size, and color
            const colors = ['#ff85a1', '#fec5bb', '#fcd5ce', '#fae1dd', '#ffe5ec'];
            const size = Math.random() * 40 + 30; // Between 30px and 70px
            
            balloon.style.left = Math.random() * 100 + 'vw';
            balloon.style.width = size + 'px';
            balloon.style.height = (size * 1.3) + 'px';
            balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.animationDuration = (Math.random() * 4 + 6) + 's'; // 6-10 seconds
            
            document.body.appendChild(balloon);
            
            // Remove balloon after it floats away to save memory
            setTimeout(() => {
                balloon.remove();
            }, 10000);
        }

        // Create a new balloon every 600ms
        setInterval(createBalloon, 600);
    </script>
</body>
                </html>
