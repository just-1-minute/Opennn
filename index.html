<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, My Love</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #ffc0cb;
            --rose-pink: #ff85a2;
            --cream: #fffaf0;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e1 100%);
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #4a4a4a;
        }

        /* --- Floating Balloons --- */
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 50px;
            border-radius: 50%;
            opacity: 0.7;
            z-index: 0;
            animation: float Up 8s ease-in infinite;
        }
        .balloon::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 19px;
            width: 2px;
            height: 20px;
            background: rgba(0,0,0,0.1);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
        }

        /* --- Header Section --- */
        .header {
            text-align: center;
            margin-top: 50px;
            z-index: 10;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: var(--rose-pink);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        p.subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* --- Gift Cards (Pinterest Style) --- */
        .gift-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 40px;
            z-index: 10;
            max-width: 500px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.2);
            text-align: center;
            transition: transform 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 192, 203, 0.3);
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
            /* Use filter to make them look more consistent/soft if needed */
        }

        .card span {
            display: block;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--rose-pink);
        }

        /* --- Countdown (Bottom) --- */
        .timer-container {
            margin-top: auto;
            padding: 40px 0;
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.5);
            width: 100%;
            backdrop-filter: blur(5px);
        }

        #timer {
            font-size: 1.5rem;
            font-weight: 500;
            color: #d87093;
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 2.5rem; }
            .gift-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Happy Birthday, Baby!</h1>
        <p class="subtitle">I HOPE YOU LIKE THEM. I LOVE YOU!</p>
    </div>

    <div class="gift-container">
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/3561/3561331.png" alt="Memories">
            <span>Captured Memories</span>
        </div>
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/2859/2859733.png" alt="Letter">
            <span>A Letter For You</span>
        </div>
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/1000/1000966.png" alt="Lock">
            <span>Special Surprise</span>
        </div>
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/2927/2927063.png" alt="Flowers">
            <span>Your Favorites</span>
        </div>
    </div>

    <div class="timer-container">
        <p>Counting every beautiful second with you...</p>
        <div id="timer">00:00:00:00</div>
    </div>

    <script>
        // Create Floating Balloons
        function createBalloon() {
            const colors = ['#ffc0cb', '#ffb6c1', '#ff69b4', '#f08080', '#e9967a'];
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.style.left = Math.random() * 100 + 'vw';
            balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.animationDuration = (Math.random() * 4 + 6) + 's';
            document.body.appendChild(balloon);

            setTimeout(() => { balloon.remove(); }, 10000);
        }
        setInterval(createBalloon, 700);

        // Simple Countdown Timer (Replace with your Anniversary or Birthday Date)
        const birthdayDate = new Date("May 4, 2026 13:00:00").getTime();

        setInterval(function() {
            const now = new Date().getTime();
            const distance = now - birthdayDate; // This shows how long you've been together/since bday

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = days + "d " + hours + "h "
            + minutes + "m " + seconds + "s ";
        }, 1000);
    </script>
</body>
        </html>
