<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        :root {
            --primary-red: #ff4d4d;
            --soft-pink: #ffe4e1;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            animation: fadeIn Down 1s ease;
        }

        /* Countdown Styles */
        .countdown-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--primary-red);
        }

        .time-box span { font-size: 0.8rem; display: block; }
        .time-box b { font-size: 1.1rem; }

        /* Gift Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: white;
            width: 120px;
            height: 120px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .card:active { transform: scale(0.9); }

        .card img { width: 80px; height: 80px; }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .floating-heart {
            position: absolute;
            color: var(--primary-red);
            animation: float 4s infinite linear;
            z-index: -1;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>Happy Birthday! 🎂</h1>

    <div class="countdown-container" id="countdown">
        </div>

    <div class="grid">
        <div class="card" onclick="alert('You are my favorite person! ❤️')">
            <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" alt="Gift">
        </div>
        <div class="card" onclick="alert('I hope you have the best day ever! 🌟')">
            <img src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png" alt="Letter">
        </div>
        <div class="card" onclick="alert('Sending you a virtual hug! 🫂')">
            <img src="https://cdn-icons-png.flaticon.com/512/2553/2553330.png" alt="Lock">
        </div>
        <div class="card" onclick="alert('Flowers for you! 💐')">
            <img src="https://cdn-icons-png.flaticon.com/512/614/614131.png" alt="Flowers">
        </div>
    </div>

    <script>
        // Set the birthday date
        const birthday = new Date("May 6, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = birthday - now;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML = `
                <div class="time-box"><b>${days}</b><span>Days</span></div>
                <div class="time-box"><b>${hours}</b><span>Hrs</span></div>
                <div class="time-box"><b>${mins}</b><span>Mins</span></div>
                <div class="time-box"><b>${secs}</b><span>Secs</span></div>
            `;
        }

        setInterval(updateCountdown, 1000);

        // Create floating hearts background
        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("floating-heart");
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 2 + "s";
            document.body.appendChild(heart);

            setTimeout(() => { heart.remove(); }, 5000);
        }

        setInterval(createHeart, 500);
    </script>
</body>
    </html>
