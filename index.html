<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>19 Years of Brilliance</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --navy: #0a192f;
            --gold: #d4af37;
            --ethereal: #f8f9fa;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--navy);
            color: var(--ethereal);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- Celebration Overlay --- */
        #entry-guard {
            position: fixed;
            inset: 0;
            background: var(--navy);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        /* --- Background --- */
        #canvas-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), #112240 0%, #0a192f 100%);
        }

        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 7vw, 4rem);
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .count-up-container {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #ccc;
            margin-top: 1rem;
        }

        #timer-display {
            font-weight: 600;
            color: var(--ethereal);
            display: block;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-top: 0.5rem;
        }

        .btn-celebrate {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 1.2rem 3rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .btn-celebrate:hover {
            background: var(--gold);
            color: var(--navy);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
        }

        .fade-out { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="entry-guard">
        <h2 style="font-family: 'Playfair Display'; color: var(--gold); margin-bottom: 2rem; text-align: center; padding: 0 20px;">A special moment awaits...</h2>
        <button class="btn-celebrate" onclick="startBirthdayExhibition()">Unlock 19</button>
    </div>

    <div id="canvas-bg"></div>

    <section>
        <div class="glass-card">
            <h1 id="bday-title">Happy 19th Birthday</h1>
            <p id="bday-status">Time spent being legendary:</p>
            
            <div class="count-up-container">
                <span id="timer-display">00:00:00:00</span>
            </div>
        </div>
    </section>

    <script>
        const BIRTHDAY_DATE = new Date('May 4, 2026 00:00:00').getTime();
        
        // Mouse movement background effect
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.documentElement.style.setProperty('--mouse-x', `${x}%`);
            document.documentElement.style.setProperty('--mouse-y', `${y}%`);
        });

        function startBirthdayExhibition() {
            // Hide the guard
            document.getElementById('entry-guard').classList.add('fade-out');

            // Trigger Confetti Cannons (Visual Celebration)
            const end = Date.now() + (4 * 1000);
            const colors = ['#d4af37', '#ffffff', '#112240'];

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
            
            // Start the Timer
            updateClock();
        }

        function updateClock() {
            const now = new Date().getTime();
            const diff = now - BIRTHDAY_DATE;

            if (diff < 0) {
                document.getElementById('bday-title').innerText = "The Countdown";
                document.getElementById('bday-status').innerText = "Time until 19 years of brilliance:";
            } else {
                document.getElementById('bday-title').innerText = "Happy 19th Birthday";
                document.getElementById('bday-status').innerText = "Time spent being legendary:";
            }

            const absDiff = Math.abs(diff);
            const d = Math.floor(absDiff / (1000 * 60 * 60 * 24));
            const h = Math.floor((absDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((absDiff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((absDiff % (1000 * 60)) / 1000);

            document.getElementById('timer-display').innerText = 
                `${d}d : ${h}h : ${m}m : ${s}s`;

            requestAnimationFrame(updateClock);
        }

        window.onload = () => {
            if (new Date().getTime() < BIRTHDAY_DATE) {
                document.getElementById('bday-title').innerText = "The Wait is On";
            }
        };
    </script>
</body>
</html>
